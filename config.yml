baseURL: "https://joaquin-casanova.github.io/"
title: Joaquin Casanova
pagination:
  pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# googleAnalytics: UA-123-45  # Update with your actual GA4 measurement ID

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  mainSections: []
  title: "Joaquin Casanova"
  description: "I build AI systems that actually ship. Data platforms, MCP integrations, and production ML on AWS."
  keywords: [Data Engineering, MLOps, AI Systems, MCP, Production ML, AWS, Platform Engineering]
  author: "Joaquin Casanova"
  # author: ["Me", "You"] # multiple authors
  images: ["/images/profile.jpg"]
  DateFormat: "January 2, 2006"
  defaultTheme: dark # auto, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

  label:
    text: "Joaquin Casanova"
    #icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set
    title: ExampleSite
    subtitle: "This is subtitle"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # home-info mode
  homeInfoParams:
    Title: "Data platforms and AI infrastructure."
    Content: "I design and build the systems behind modern data teams — platform architecture, 
      production workflows, and the infrastructure that supports reliable AI systems."
  socialIcons:
    - name: twitter
      url: "https://twitter.com/joaquincasanov4"
    - name: linkedin
      url: "https://www.linkedin.com/in/joaquincasanova/"
    - name: github
      url: "https://github.com/joaquin-casanova"

  # analytics:
  #   google:
  #     SiteVerificationTag: "your-google-verification-tag"
  #   bing:
  #     SiteVerificationTag: "your-bing-verification-tag"
  #   yandex:
  #     SiteVerificationTag: "your-yandex-verification-tag"

  cover:
    hidden: false # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page

  editPost:
    URL: "https://github.com/joaquin-casanova/joaquin-casanova.github.io/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: get-in-touch
      name: Get in Touch
      url: /get-in-touch/
      weight: 5
    - identifier: posts
      name: Writing
      url: /posts/
      weight: 10
    - identifier: about
      name: About
      url: about/
      weight: 20

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
    highlight:
        anchorLineNos: true
        codeFences: true
        guessSyntax: true
        lineNos: true
        style: github-dark